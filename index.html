<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="description" content="Reproducibly convert digits to words and back.">
    <meta name="keywords" content="phone phrase, digits to words, converter">
    <meta name="author" content="William Cutler">
    <meta name="theme-color" content="#fbc02d">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Phone Phrase</title>
    <script>
        let WORD_ARRAY = [];

        window.addEventListener("DOMContentLoaded", async () => {
            const res = await fetch("union_corpus_max_8.json");
            WORD_ARRAY = await res.json();
            console.log("Loaded", WORD_ARRAY.length, "words");
        });
    </script>
    <script src="script.js" defer></script>
</head>

<body>
    <header>
        <h1>phone.phrase</h1>
        <p>Reproducibly convert digits to words and back, ignoring punctuation. Nothing is saved. Inspired by
            what3words.com</p>

    </header>

    <!-- Main content section: input/output cards side by side -->
    <main id="mainContent">
        <!-- Input card -->
        <div class="card" id="inputCard">
            <label for="inputArea">Input:</label>
            <textarea id="inputArea" rows="1" cols="40"></textarea>
            <button id="convertBtn">Convert</button>
        </div>

        <!-- Output card -->
        <div class="card" id="outputCard">
            <label for="inputArea">Result:</label>
            <span id="output">-</span>
            <button id="copyBtn">Copy</button>
        </div>
    </main>

    <a href="https://buymeacoffee.com/williamcutler" target="_blank" rel="noopener noreferrer">Buy me a coffee ☕</a>

</html>
